[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["app/tests"]
addopts = "-q"

[tool.coverage.run]
source = ["app"]
omit = ["app/tests/*", "alembic/*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
# B008: FastAPI Depends() in defaults is idiomatic.
# UP042: `class X(str, Enum)` is intentional for JSON/DB string serialization.
ignore = ["B008", "UP042"]

[tool.ruff.lint.per-file-ignores]
# Tests favor compact inline fixtures/data over strict line length & format.
"app/tests/**" = ["E501", "UP031"]
