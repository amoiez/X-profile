# Production overrides. Use together with the base compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from dev:
#  - Nginx terminates TLS on 80/443 (see nginx/nginx.prod.conf + ./certs).
#  - Backend served by Gunicorn with Uvicorn workers.
#  - APP_ENV=production (no stack traces leaked, rate limiting enabled).

services:
  backend:
    environment:
      APP_ENV: production
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             -k uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  worker:
    environment:
      APP_ENV: production

  frontend:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api/v1

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
