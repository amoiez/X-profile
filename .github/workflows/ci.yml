name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# No production credentials are used or required in CI. The app runs in mock
# mode (X_PROVIDER=mock) for tests.
env:
  APP_ENV: test
  X_PROVIDER: mock

jobs:
  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest app/tests \
            --cov=app/analytics --cov=app/services \
            --cov-report=term-missing --cov-fail-under=80 \
            -W ignore::DeprecationWarning

  frontend:
    name: Frontend lint, typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t xba-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t xba-frontend:ci ./frontend

  security-scan:
    name: Dependency / security scan
    runs-on: ubuntu-latest
    # Advisories should surface but not hard-block the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (backend)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true
